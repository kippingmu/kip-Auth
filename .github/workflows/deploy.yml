name: build-push-deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Optional image tag to deploy (default: current commit sha12)"
        required: false
        type: string
      nacos_mode:
        description: "Publish or verify the K8s Nacos config"
        required: false
        type: choice
        default: publish
        options:
          - publish
          - verify

concurrency:
  group: prod-deploy-kip-auth
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: [self-hosted, linux, prod]
    environment: prod
    permissions:
      contents: read
    env:
      DOCKER_BUILDKIT: "1"
      BUILDKIT_PROGRESS: plain
      IMAGE_REPO: registry.cn-hangzhou.aliyuncs.com/kip-app/kip-auth
      KUBECONFIG_PATH: /etc/kubernetes/admin.conf
      KUBE_NAMESPACE: kip-poc
      IMAGE_PULL_SECRET_NAME: kip-acr-pull
      DEPLOYMENT_NAME: kip-auth
      SERVICE_NAME: kip-auth
      APP_LABEL: kip-auth
      HEALTH_PORT: "5001"
      NACOS_ADDR: ${{ secrets.NACOS_ADDR || '10.42.0.125:8848' }}
      NACOS_USER: ${{ secrets.NACOS_USER || 'nacos' }}
      NACOS_PASS: ${{ secrets.NACOS_PASS || 'nacos8848' }}
      NACOS_NAMESPACE: 74a3fe73-35c1-474e-ade8-9bc460b3f398
      NACOS_GROUP: K8S_POC
      NACOS_DATA_ID: kip-auth-k8s.yml
      MYSQL_URL: ${{ secrets.MYSQL_URL }}
      MYSQL_USERNAME: ${{ secrets.MYSQL_USERNAME }}
      MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
      REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
      AUTH_JWT_SECRET: ${{ secrets.AUTH_JWT_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Resolve image variables
        shell: bash
        run: |
          set -euo pipefail
          IMAGE_TAG_INPUT="${{ github.event.inputs.image_tag }}"
          if [ -n "${IMAGE_TAG_INPUT}" ]; then
            IMAGE_TAG="${IMAGE_TAG_INPUT}"
          else
            IMAGE_TAG="${GITHUB_SHA::12}"
          fi

          echo "IMAGE_TAG=${IMAGE_TAG}" >> "$GITHUB_ENV"
          echo "FULL_IMAGE=${IMAGE_REPO}:${IMAGE_TAG}" >> "$GITHUB_ENV"

      - name: Docker login to ACR
        shell: bash
        run: |
          set -euo pipefail
          REGISTRY_USERNAME="${{ secrets.ALIYUN_REGISTRY_USERNAME }}"
          REGISTRY_PASSWORD="${{ secrets.ALIYUN_REGISTRY_PASSWORD }}"

          if [ -z "${REGISTRY_USERNAME}" ] || [ -z "${REGISTRY_PASSWORD}" ]; then
            echo "Missing ACR credentials" >&2
            exit 1
          fi

          echo "${REGISTRY_PASSWORD}" | docker login registry.cn-hangzhou.aliyuncs.com -u "${REGISTRY_USERNAME}" --password-stdin

      - name: Ensure K8s image pull secret
        shell: bash
        run: |
          set -euo pipefail
          kubectl get namespace "${KUBE_NAMESPACE}" >/dev/null 2>&1 || kubectl create namespace "${KUBE_NAMESPACE}"
          kubectl -n "${KUBE_NAMESPACE}" create secret docker-registry "${IMAGE_PULL_SECRET_NAME}" \
            --docker-server="registry.cn-hangzhou.aliyuncs.com" \
            --docker-username="${{ secrets.ALIYUN_REGISTRY_USERNAME }}" \
            --docker-password="${{ secrets.ALIYUN_REGISTRY_PASSWORD }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Prepare kip-open-common for docker build
        shell: bash
        run: |
          set -euo pipefail
          DEP_DIR="$HOME/.m2/repository/xyz/kip/kip-open-common/1.0-SNAPSHOT"
          test -f "$DEP_DIR/kip-open-common-1.0-SNAPSHOT.jar"
          test -f "$DEP_DIR/kip-open-common-1.0-SNAPSHOT.pom"

          rm -rf deps
          mkdir -p deps
          cp "$DEP_DIR/kip-open-common-1.0-SNAPSHOT.jar" deps/
          cp "$DEP_DIR/kip-open-common-1.0-SNAPSHOT.pom" deps/
          ls -lh deps/

      - name: Sync Nacos config
        shell: bash
        run: |
          set -euo pipefail
          MODE="${{ github.event.inputs.nacos_mode }}"
          if [ -z "$MODE" ]; then
            MODE="publish"
          fi
          ./scripts/ops/k8s/nacos-sync.sh "$MODE"

      - name: Build image
        shell: bash
        run: |
          set -euo pipefail
          docker build --progress=plain -t "${FULL_IMAGE}" .

      - name: Push image
        shell: bash
        run: |
          set -euo pipefail
          docker push "${FULL_IMAGE}"

      - name: Deploy to Kubernetes
        shell: bash
        run: |
          set -euo pipefail
          sudo -E ./scripts/ops/k8s/deploy.sh

      - name: Auth smoke verification
        shell: bash
        run: |
          set -euo pipefail
          sudo -E ./scripts/ops/k8s/smoke.sh

      - name: Persist deployed tag
        if: success()
        shell: bash
        run: |
          set -euo pipefail
          STATE_DIR="${GITHUB_WORKSPACE}/.deploy-state"
          mkdir -p "${STATE_DIR}"
          printf "%s" "${IMAGE_TAG}" > "${STATE_DIR}/current_image_tag"

      - name: Rollback on failure
        if: failure()
        shell: bash
        run: |
          set -euo pipefail
          sudo -E ./scripts/ops/k8s/rollback.sh

      - name: Docker logout
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          docker logout registry.cn-hangzhou.aliyuncs.com || true
