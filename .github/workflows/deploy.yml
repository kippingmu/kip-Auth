name: build-push-deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Optional image tag to deploy (default: current commit sha12)"
        required: false
        type: string

concurrency:
  group: prod-deploy-kip-auth
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: [self-hosted, linux, prod]
    environment: prod
    permissions:
      contents: read
    env:
      DOCKER_BUILDKIT: "1"
      BUILDKIT_PROGRESS: plain
      IMAGE_REPO: registry.cn-hangzhou.aliyuncs.com/kip-app/kip-auth
      DEPLOY_PATH: /home/xiaoshichuan/apps/kip-auth
      HEALTHCHECK_URL: http://127.0.0.1:5001/actuator/health

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image variables
        shell: bash
        run: |
          set -euo pipefail
          IMAGE_TAG_INPUT="${{ github.event.inputs.image_tag }}"
          if [ -n "${IMAGE_TAG_INPUT}" ]; then
            IMAGE_TAG="${IMAGE_TAG_INPUT}"
          else
            IMAGE_TAG="${GITHUB_SHA::12}"
          fi

          echo "IMAGE_TAG=${IMAGE_TAG}" >> "$GITHUB_ENV"
          echo "FULL_IMAGE=${IMAGE_REPO}:${IMAGE_TAG}" >> "$GITHUB_ENV"

      - name: Docker login to ACR
        shell: bash
        run: |
          set -euo pipefail
          REGISTRY_USERNAME="${{ secrets.ALIYUN_REGISTRY_USERNAME }}"
          REGISTRY_PASSWORD="${{ secrets.ALIYUN_REGISTRY_PASSWORD }}"

          if [ -n "${REGISTRY_USERNAME}" ] && [ -n "${REGISTRY_PASSWORD}" ]; then
            echo "${REGISTRY_PASSWORD}" | docker login registry.cn-hangzhou.aliyuncs.com -u "${REGISTRY_USERNAME}" --password-stdin
          else
            echo "Registry secrets not configured; reusing existing docker login on runner host"
          fi

      - name: Prepare kip-open-common for docker build
        shell: bash
        run: |
          set -euo pipefail
          DEP_ROOT="$HOME/.m2/repository/xyz/kip/kip-open-common"
          DEP_DIR="$DEP_ROOT/1.0-SNAPSHOT"
          test -f "$DEP_ROOT/maven-metadata-local.xml"
          test -f "$DEP_DIR/kip-open-common-1.0-SNAPSHOT.jar"
          test -f "$DEP_DIR/kip-open-common-1.0-SNAPSHOT.pom"

          rm -rf deps
          mkdir -p deps/kip-open-common-root deps/kip-open-common
          cp "$DEP_ROOT/maven-metadata-local.xml" deps/kip-open-common-root/
          cp "$DEP_DIR/kip-open-common-1.0-SNAPSHOT.jar" deps/kip-open-common/
          cp "$DEP_DIR/kip-open-common-1.0-SNAPSHOT.pom" deps/kip-open-common/
          cp "$DEP_DIR/maven-metadata-local.xml" deps/kip-open-common/
          cp "$DEP_DIR/_remote.repositories" deps/kip-open-common/
          find deps -maxdepth 2 -type f | sort

      - name: Build image
        shell: bash
        run: |
          set -euo pipefail
          docker build --progress=plain -t "${IMAGE_REPO}:${IMAGE_TAG}" -t "${IMAGE_REPO}:latest" .

      - name: Push image
        id: push_image
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          docker push "${IMAGE_REPO}:${IMAGE_TAG}"
          docker push "${IMAGE_REPO}:latest"

      - name: Deploy with docker compose
        shell: bash
        run: |
          set -euo pipefail
          STATE_DIR="${DEPLOY_PATH}/.deploy-state"
          CURRENT_FILE="${STATE_DIR}/current_image_tag"

          test -d "${DEPLOY_PATH}"
          test -f "${DEPLOY_PATH}/docker-compose.yml"

          mkdir -p "${STATE_DIR}"
          PREV_TAG=""
          if [ -f "${CURRENT_FILE}" ]; then
            PREV_TAG="$(cat "${CURRENT_FILE}")"
          fi

          echo "PREV_TAG=${PREV_TAG}" >> "$GITHUB_ENV"

          cd "${DEPLOY_PATH}"
          export IMAGE_TAG

          if [ "${{ steps.push_image.outcome }}" = "success" ]; then
            docker compose pull
          else
            echo "Registry push failed; deploying the freshly built local image on the runner host"
            docker image inspect "${FULL_IMAGE}" >/dev/null
          fi

          docker compose up -d

      - name: Health check
        shell: bash
        run: |
          set -euo pipefail
          for i in $(seq 1 20); do
            if curl -fsS "${HEALTHCHECK_URL}" >/dev/null; then
              echo "Health check passed"
              exit 0
            fi
            sleep 5
          done

          echo "Health check failed"
          exit 1

      - name: Persist deployed tag
        if: success()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${DEPLOY_PATH}/.deploy-state"
          printf "%s" "${IMAGE_TAG}" > "${DEPLOY_PATH}/.deploy-state/current_image_tag"

      - name: Rollback on failure
        if: failure() && env.PREV_TAG != ''
        shell: bash
        run: |
          set -euo pipefail
          cd "${DEPLOY_PATH}"
          export IMAGE_TAG="${PREV_TAG}"
          docker compose pull
          docker compose up -d

      - name: Docker logout
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          REGISTRY_USERNAME="${{ secrets.ALIYUN_REGISTRY_USERNAME }}"
          REGISTRY_PASSWORD="${{ secrets.ALIYUN_REGISTRY_PASSWORD }}"

          if [ -n "${REGISTRY_USERNAME}" ] && [ -n "${REGISTRY_PASSWORD}" ]; then
            docker logout registry.cn-hangzhou.aliyuncs.com || true
          else
            echo "Skipping docker logout because workflow reused runner host login"
          fi
