server:
  port: 5001

spring:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  jackson:
    serialization:
      write-dates-as-timestamps: false
      indent-output: true
  cloud:
    sentinel:
      transport:
        port: 8090
      web-context-unify: true

# 认证配置
auth:
  jwt:
    # JWT密钥 (生产环境请修改为更强的密钥)
    secret: KipAuthServiceSecretKeyMustBeAtLeast32CharactersLongForHS256
    # token过期时间 (单位：毫秒，默认24小时)
    expiration: 86400000
    # token前缀
    prefix: "Bearer "
    # token header名
    header: Authorization
