server:
  shutdown: graceful

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  application:
    name: kip-auth
  config:
    import:
      - optional:nacos:${spring.application.name}-${spring.profiles.active}.yml?group=${NACOS_GROUP:DEFAULT_GROUP}&refreshEnabled=true
  cloud:
    service-registry:
      auto-registration:
        enabled: ${NACOS_AUTO_REGISTRATION_ENABLED:false}
    nacos:
      config:
        enabled: ${NACOS_CONFIG_ENABLED:true}
        server-addr: ${NACOS_SERVER_ADDR:10.42.0.125:8848}
        file-extension: yml
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        namespace: ${NACOS_NAMESPACE:}
        refresh-enabled: true
      discovery:
        enabled: ${NACOS_DISCOVERY_ENABLED:false}
        server-addr: ${NACOS_SERVER_ADDR:10.42.0.125:8848}
        register-enabled: ${NACOS_REGISTER_ENABLED:false}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        namespace: ${NACOS_NAMESPACE:}
    sentinel:
      transport:
        dashboard: ${SENTINEL_DASHBOARD:10.42.0.125:8090}
        port: ${SENTINEL_PORT:8720}

  jackson:
    serialization:
      write-dates-as-timestamps: false
      indent-output: true
  lifecycle:
    timeout-per-shutdown-phase: 30s

mybatis:
  config-location: classpath:mybatis-config.xml
  mapper-locations: classpath:mapper/*.xml

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,refresh
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
